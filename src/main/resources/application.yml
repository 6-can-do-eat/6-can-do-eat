server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: six-can-do-eat

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY}
    base-url: https://api.tosspayments.com

gemini:
  base-url: https://generativelanguage.googleapis.com
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

management:
  endpoints:
    web:
      exposure:
        include: health  # health 엔드포인트를 웹에 노출
  endpoint:
    health:
      show-details: when_authorized # 상세 정보는 인증 시에만 (보안)
      probes:
        enabled: true # Liveness, Readiness 프로브 활성화 (Cloud Run 연동 시 유리)
