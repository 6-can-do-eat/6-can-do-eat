      summary: 가게별 메뉴 목록 조회
      description: |-
        가게별 메뉴 목록을 페이징 조회합니다.

        **[특징]**
        - 숨김 처리된 메뉴는 제외하고 반환합니다.
        - 키워드 검색을 통해 메뉴명을 필터링할 수 있습니다.
      operationId: getMenus
      parameters:
        - name: storeId
          in: path
          description: 조회할 가게의 ID
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          description: 메뉴명 검색어
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: 페이지 번호 (0부터)
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          description: 페이지 당 개수 (기본 10)
          required: false
          schema:
            type: integer
            format: int32
            default: 10
        - name: sortBy
          in: query
          description: 정렬 필드 (기본 createdAt)
          required: false
          schema:
            type: string
            default: createdAt
        - name: isAsc
          in: query
          description: 오름차순 여부
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponsePageMenuResponse"
    post:
      tags:
        - Menu
      summary: 메뉴 등록 (AI 설명 생성 지원)
      description: |-
        특정 가게에 새로운 메뉴를 추가합니다.

        **[AI 연동 로직]**
        - `aiDescription`이 `true`인 경우: `aiPrompt`를 반드시 입력해야 하며, 시스템이 AI를 통해 설명을 자동 생성합니다.
        - `aiDescription`이 `false`인 경우: 입력된 `description`을 그대로 사용합니다.

        **[권한 및 제약]**
        - 권한: `OWNER`(본인)만 등록 가능합니다.
        - 유효성: 본인 소유의 가게(`storeId`)인지 검증합니다.
      operationId: createMenu
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/MenuRequest"
        required: true
      responses:
        '201':
          description: 메뉴 생성 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseMenuResponse"
        '400':
          description: 입력값 검증 실패
          content:
            "*/*":
              examples:
                이름 누락:
                  description: 이름 누락
                  value:
                    code: COMMON_400
                    status: BAD_REQUEST
                    message: 메뉴 이름은 필수입니다.
                가격 누락:
                  description: 가격 누락
                  value:
                    code: COMMON_400
                    status: BAD_REQUEST
                    message: 가격은 필수입니다.
                AI 프롬프트 누락:
                  description: AI 프롬프트 누락
                  value:
                    code: COMMON_400
                    status: BAD_REQUEST
                    message: 프롬프트를 입력해 주세요.
        '403':
          description: 권한 부족
          content:
            "*/*":
              example:
                code: MENU_403
                status: FORBIDDEN
                message: 메뉴에 대한 권한이 없습니다.
        '404':
          description: 가게 없음
          content:
            "*/*":
              example:
                code: STORE_404
                status: NOT_FOUND
                message: 해당 가게가 존재하지 않습니다.
