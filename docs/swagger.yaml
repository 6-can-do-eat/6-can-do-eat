        가맹점주가 본인 가게의 전체 메뉴 리스트를 조회합니다.

        **[특징]**
        - 권한: `OWNER`(본인)만 호출 가능합니다.
        - 숨김 처리된 메뉴를 포함하여 전체 메뉴를 반환합니다.
      operationId: getMenusForOwner
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
