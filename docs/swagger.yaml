  "/api/v1/orders/{orderId}/review":
    post:
      tags:
        - Review
      summary: 리뷰 작성
      description: |-
        특정 주문에 대한 리뷰를 작성합니다. 작성 성공 시 가게의 평균 평점이 갱신됩니다.

        **[권한 및 제약 사항]**
        - 권한: `CUSTOMER` (본인의 주문에 대해서만 가능)
        - **상태 제약**: 주문 상태가 `COMPLETED`(픽업 완료)인 경우에만 작성할 수 있습니다.
        - **중복 방지**: 한 주문당 하나의 리뷰만 작성할 수 있습니다.

        **[발생 가능한 비즈니스 에러]**
        - `REVIEW_NOT_FOUND`: 주문 ID가 존재하지 않을 때
        - `REVIEW_FORBIDDEN`: 타인의 주문에 리뷰를 남기려 할 때
        - `REVIEW_CONFLICT`: 해당 주문에 이미 리뷰가 등록되어 있을 때
        - `REVIEW_BAD_REQUEST`: 주문이 완료 상태가 아닐 때
      operationId: createReview
      parameters:
        - name: orderId
          in: path
          description: 주문 고유 ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ReviewRequestDto"
        required: true
      responses:
        '201':
          description: 리뷰 생성 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseReviewResponseDto"
        '400':
          description: 입력값 오류 또는 주문 미완료 상태
          content:
            "*/*":
              example:
                code: REVIEW_BAD_REQUEST
                status: BAD_REQUEST
                message: 완료된 주문에 대해서만 리뷰를 작성할 수 있습니다.
        '403':
          description: 권한 부족 (작성자 불일치)
          content:
            "*/*":
              example:
                code: REVIEW_FORBIDDEN
                status: FORBIDDEN
                message: 본인의 주문에 대해서만 리뷰를 남길 수 있습니다.
        '404':
          description: 주문 없음
          content:
            "*/*":
              example:
                code: REVIEW_NOT_FOUND
                status: NOT_FOUND
                message: 대상을 찾을 수 없습니다.
        '409':
          description: 리뷰 중복
          content:
            "*/*":
              example:
                code: REVIEW_CONFLICT
                status: CONFLICT
                message: 이미 해당 주문에 대한 리뷰가 존재합니다.
