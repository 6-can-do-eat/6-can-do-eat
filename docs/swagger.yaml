        - 숨김 처리된 가게를 포함하여 본인의 모든 가게를 조회합니다.
      operationId: getStoresForOwner
      parameters:
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: areaId
