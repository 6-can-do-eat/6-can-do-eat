---
openapi: 3.1.0
info:
  title: Six Can Do Eat API
  version: v1
servers:
  - url: http://localhost:8080
    description: Generated server url
security:
  - bearerAuth: []
tags:
  - name: Area
    description: 운영 지역 관리 API
  - name: Payment
    description: 결제 관리 API
  - name: Store
    description: 가게 관리 API
  - name: Menu
    description: 메뉴 관리 API
  - name: Order
    description: 주문 관리 API
  - name: Address
    description: 배송지 관리 API
  - name: Review
    description: 리뷰 관리 API
  - name: Category
    description: 카테고리 관리 API
  - name: User
    description: 사용자 관리 API
  - name: Auth
    description: 인증/인가 관리 API
paths:
  "/api/v1/users/{userId}":
    put:
      tags:
        - User
      summary: 사용자 정보 수정
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserInfoRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseUserInfoResponse"
    delete:
      tags:
        - User
      summary: 사용자 삭제 (소프트 삭제)
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseVoid"
  "/api/v1/stores/{storeId}":
    get:
      tags:
        - Store
      summary: 가게 상세 조회
      description: |-
        가게 고유 ID를 통해 특정 가게의 상세 정보를 조회합니다.

        **[비즈니스 에러]**
        - `STORE_NOT_FOUND`: 존재하지 않거나 삭제된 가게 ID 조회 시
      operationId: getStoreById
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 조회 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseStoreResponse"
        '404':
          description: 가게 없음
          content:
            "*/*":
              example:
                code: STORE_404
                status: NOT_FOUND
                message: 해당 가게가 존재하지 않습니다.
    put:
      tags:
        - Store
      summary: 가게 정보 수정
      description: |-
        가게의 기본 정보(이름, 주소, 카테고리, 지역)를 수정합니다.

        **[권한 및 제약 사항]**
        - 권한: `OWNER`(본인), `MANAGER`, `MASTER`

        **[비즈니스 에러]**
        - `STORE_FORBIDDEN`: 해당 가게에 대한 수정 권한이 없음
      operationId: updateStore
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/StoreRequest"
        required: true
      responses:
        '200':
          description: 수정 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseStoreResponse"
        '400':
          description: 입력 데이터 오류
          content:
            "*/*":
              example:
                code: COMMON_400
                status: BAD_REQUEST
                message: 가게 이름은 필수입니다.
        '403':
          description: 수정 권한 부족 (소유자 아님)
          content:
            "*/*":
              example:
                code: STORE_403
                status: FORBIDDEN
                message: 가게에 대한 권한이 없습니다.
        '404':
          description: 가게/카테고리/지역 미존재
          content:
            "*/*":
              example:
                code: STORE_404
                status: NOT_FOUND
                message: 해당 가게가 존재하지 않습니다.
    delete:
      tags:
        - Store
      summary: 가게 삭제 (소프트 삭제)
      description: |-
        가게를 시스템에서 삭제 처리합니다.

        **[권한 및 처리 방식]**
        - 권한: `OWNER`(본인), `MASTER`
        - 방식: `deleted_at`을 기록하고 조회에서 제외하는 소프트 삭제 방식입니다.
      operationId: deleteStore
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseVoid"
        '403':
          description: 삭제 권한 부족
          content:
            "*/*":
              example:
                code: STORE_403
                status: FORBIDDEN
                message: 가게에 대한 권한이 없습니다.
        '404':
          description: 가게 없음
          content:
            "*/*":
              example:
                code: STORE_404
                status: NOT_FOUND
                message: 해당 가게가 존재하지 않습니다.
  "/api/v1/reviews/{reviewId}":
    get:
      tags:
        - Review
      summary: 리뷰 단일 조회
      description: 리뷰 ID를 통해 상세 내용을 조회합니다. 소프트 삭제된 리뷰는 조회되지 않습니다.
      operationId: getReview
      parameters:
        - name: reviewId
          in: path
          description: 리뷰 고유 ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 조회 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseReviewResponseDto"
        '404':
          description: 리뷰 없음
          content:
            "*/*":
              example:
                code: REVIEW_NOT_FOUND
                status: NOT_FOUND
                message: 존재하지 않거나 삭제된 리뷰입니다.
    put:
      tags:
        - Review
      summary: 리뷰 수정
      description: |-
        작성된 리뷰의 평점과 내용을 수정합니다. 수정 완료 시 가게의 평균 평점이 재계산됩니다.

        **[권한 및 제약 사항]**
        - 권한: `CUSTOMER` (본인 작성 리뷰만 가능)
        - 삭제된 리뷰는 수정할 수 없습니다.
      operationId: updateReview
      parameters:
        - name: reviewId
          in: path
          description: 수정할 리뷰 ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ReviewRequestDto"
        required: true
      responses:
        '200':
          description: 수정 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseReviewResponseDto"
        '400':
          description: 입력값 오류 (평점 1~5 범위를 벗어남 등)
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseReviewResponseDto"
        '403':
          description: 권한 부족
          content:
            "*/*":
              example:
                code: REVIEW_FORBIDDEN
                status: FORBIDDEN
                message: 리뷰 수정 권한이 없습니다.
        '404':
          description: 리뷰 없음
          content:
            "*/*":
              example:
                code: REVIEW_NOT_FOUND
                status: NOT_FOUND
                message: 수정할 리뷰를 찾을 수 없습니다.
    delete:
      tags:
        - Review
      summary: 리뷰 삭제 (소프트 삭제)
      description: |-
        리뷰를 시스템에서 삭제 처리(Soft Delete)합니다. 삭제 시 가게의 평균 평점이 즉시 갱신됩니다.

        **[권한 정책]**
        - `CUSTOMER`: 본인이 작성한 리뷰만 삭제 가능
        - `MANAGER`, `MASTER`: 모든 리뷰 삭제 가능
      operationId: deleteReview
      parameters:
        - name: reviewId
          in: path
          description: 삭제할 리뷰 ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
        '403':
          description: 권한 부족
          content:
            "*/*":
              example:
                code: REVIEW_FORBIDDEN
                status: FORBIDDEN
                message: 리뷰 삭제 권한이 없습니다.
        '404':
          description: 리뷰 없음
          content:
            "*/*":
              example:
                code: REVIEW_NOT_FOUND
                status: NOT_FOUND
                message: 이미 삭제되었거나 존재하지 않는 리뷰입니다.
  "/api/v1/orders/{orderId}":
    get:
      tags:
        - Order
      summary: 주문 상세 조회
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseOrderResponse"
    put:
      tags:
        - Order
      summary: 주문 수정 (요청 사항)
      operationId: updateOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Request"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseResponse"
    delete:
      tags:
        - Order
      summary: 주문 삭제(소프트 삭제)
      operationId: deleteOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  "/api/v1/menus/{menuId}":
    get:
      tags:
        - Menu
      summary: 메뉴 상세 조회
      description: |-
        메뉴 고유 ID를 통해 특정 메뉴의 상세 정보를 조회합니다.

        **[비즈니스 에러]**
        - `MENU_404`: 존재하지 않거나 삭제된 메뉴 ID
      operationId: getMenuById
      parameters:
        - name: menuId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 조회 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseMenuResponse"
        '404':
          description: 메뉴 없음
          content:
            "*/*":
              example:
                code: MENU_404
                status: NOT_FOUND
                message: 해당 메뉴가 존재하지 않습니다.
    put:
      tags:
        - Menu
      summary: 메뉴 정보 수정
      description: |
        기존 메뉴의 이름, 가격, 설명을 수정합니다.

        **[권한 정책]**
        - 수정 가능 등급: `OWNER`(본인), `MANAGER`, `MASTER`
      operationId: updateMenu
      parameters:
        - name: menuId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateMenuRequest"
        required: true
      responses:
        '200':
          description: 수정 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseMenuResponse"
        '400':
          description: 입력 데이터 오류
          content:
            "*/*":
              example:
                code: COMMON_400
                status: BAD_REQUEST
                message: 메뉴 이름은 필수입니다.
        '403':
          description: 수정 권한 부족
          content:
            "*/*":
              example:
                code: MENU_403
                status: FORBIDDEN
                message: 메뉴에 대한 권한이 없습니다.
        '404':
          description: 메뉴 미존재
          content:
            "*/*":
              example:
                code: MENU_404
                status: NOT_FOUND
                message: 해당 메뉴가 존재하지 않습니다.
    delete:
      tags:
        - Menu
      summary: 메뉴 삭제 (소프트 삭제)
      description: |
        메뉴를 삭제 처리합니다.

        **[권한 정책]**
        - 삭제 가능 등급: `OWNER`(본인), `MASTER`
      operationId: deleteMenu
      parameters:
        - name: menuId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseVoid"
        '403':
          description: 삭제 권한 부족
          content:
            "*/*":
              example:
                code: MENU_403
                status: FORBIDDEN
                message: 메뉴에 대한 권한이 없습니다.
        '404':
          description: 메뉴 미존재
          content:
            "*/*":
              example:
                code: MENU_404
                status: NOT_FOUND
                message: 해당 메뉴가 존재하지 않습니다.
  "/api/v1/categories/{categoryId}":
    get:
      tags:
        - Category
      summary: 카테고리 상세 조회
      description: |-
        카테고리 ID를 통해 특정 카테고리의 정보를 상세 조회합니다.

        **[비즈니스 에러]**
        - `CATEGORY_404`: 해당 ID의 카테고리가 존재하지 않거나 삭제됨
      operationId: getCategoryById
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 조회 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseCategoryResponse"
        '404':
          description: 카테고리 없음
          content:
            "*/*":
              example:
                code: CATEGORY_404
                status: NOT_FOUND
                message: 해당 카테고리가 존재하지 않습니다.
    put:
      tags:
        - Category
      summary: 카테고리 정보 수정
      description: |-
        기존 카테고리의 이름을 변경합니다.

        **[권한 및 제약 사항]**
        - 권한: `MASTER`, `MANAGER`
        - 중복 체크: 본인 이외의 다른 카테고리가 사용하는 이름으로는 수정할 수 없습니다.
      operationId: updateCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CategoryRequest"
        required: true
      responses:
        '200':
          description: 수정 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseCategoryResponse"
        '400':
          description: 입력값 검증 실패
          content:
            "*/*":
              example:
                code: COMMON_400
                status: BAD_REQUEST
                message: 카테고리 이름은 필수입니다.
        '403':
          description: 권한 부족
          content:
            "*/*":
              example:
                code: CATEGORY_403
                status: FORBIDDEN
                message: 카테고리에 대한 권한이 없습니다.
        '404':
          description: 카테고리 없음
          content:
            "*/*":
              example:
                code: CATEGORY_404
                status: NOT_FOUND
                message: 해당 카테고리가 존재하지 않습니다.
        '409':
          description: 이름 중복
          content:
            "*/*":
              example:
                code: CATEGORY_409
                status: CONFLICT
                message: 이미 존재하는 카테고리 이름입니다.
    delete:
      tags:
        - Category
      summary: 카테고리 삭제 (소프트 삭제)
      description: |-
        카테고리를 시스템에서 삭제 처리합니다. 데이터는 보관되지만 일반 조회에서는 제외됩니다.

        **[권한 및 제약 사항]**
        - 권한: `MASTER`
        - 처리 방식: `deleted_at` 컬럼에 삭제 시간을 기록하고 삭제한 사용자 ID를 남깁니다.
      operationId: deleteCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
        '403':
          description: 권한 부족
          content:
            "*/*":
              example:
                code: CATEGORY_403
                status: FORBIDDEN
                message: 카테고리에 대한 권한이 없습니다.
        '404':
          description: 카테고리 없음
          content:
            "*/*":
              example:
                code: CATEGORY_404
                status: NOT_FOUND
                message: 해당 카테고리가 존재하지 않습니다.
  "/api/v1/areas/{areaId}":
    get:
      tags:
        - Area
      summary: 운영 지역 상세 조회
      operationId: getArea
      parameters:
        - name: areaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseAreaResponse"
    put:
      tags:
        - Area
      summary: 운영 지역 수정
      operationId: updateArea
      parameters:
        - name: areaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateAreaRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseAreaResponse"
    delete:
      tags:
        - Area
      summary: 운영 지역 삭제 소프트 삭제)
      operationId: deleteArea
      parameters:
        - name: areaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseVoid"
  "/api/v1/addresses/{adId}":
    get:
      tags:
        - Address
      summary: 배송지 상세 조회
      operationId: getAddressById
      parameters:
        - name: adId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseAddressResponse"
    put:
      tags:
        - Address
      summary: 배송지 수정
      operationId: updateAddress
      parameters:
        - name: adId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AddressUpdateRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseAddressResponse"
    delete:
      tags:
        - Address
      summary: 배송지 삭제 (소프트 삭제)
      operationId: deleteAddress
      parameters:
        - name: adId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  "/api/v1/stores":
    get:
      tags:
        - Store
      summary: 가게 목록 전체 조회
      description: |-
        모든 가게를 조회합니다.

        **[조회 특징]**
        - 숨김 및 삭제 상태인 가게는 결과에서 제외됩니다.
        - 검색 필터: 이름 키워드, 카테고리 ID, 지역 ID를 통한 필터링을 지원합니다.
      operationId: getStores
      parameters:
        - name: keyword
          in: query
          description: 가게 이름 검색어 (대소문자 무시)
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          description: 카테고리 ID 필터링
          required: false
          schema:
            type: string
            format: uuid
        - name: areaId
          in: query
          description: 지역 ID 필터링
          required: false
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: 페이지 번호 (0부터 시작)
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          example: 0
        - name: size
          in: query
          description: 페이지 당 데이터 개수
          required: false
          schema:
            type: integer
            format: int32
            default: 10
          example: 10
        - name: sortBy
          in: query
          description: '정렬 기준 (기본: createdAt)'
          required: false
          schema:
            type: string
            default: createdAt
          example: average_rating
        - name: isAsc
          in: query
          description: 오름차순 여부
          required: false
          schema:
            type: boolean
            default: false
          example: false
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponsePageStoreResponse"
    post:
      tags:
        - Store
      summary: 가게 신규 생성
      description: |-
        가맹점주가 새로운 가게를 시스템에 등록합니다.

        **[권한 및 제약 사항]**
        - 권한: `OWNER`
        - 소유자 할당: 현재 로그인한 사용자가 해당 가게의 주인으로 자동 등록됩니다.
        - 초기 상태: 평점은 0.0으로 설정되며, 숨김 상태(isHidden)는 `false`로 시작합니다.

        **[발생 가능한 비즈니스 에러]**
        - `USER_NOT_FOUND`: 로그인된 사용자 정보를 찾을 수 없을 때
        - `STORE_NOT_FOUND`: 입력한 `categoryId` 또는 `areaId`가 존재하지 않을 때
      operationId: createStore
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/StoreRequest"
        required: true
      responses:
        '201':
          description: 가게 생성 성공
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/SuccessResponseStoreResponse"
        '400':
          description: 필수 필드 누락 또는 형식 오류
          content:
            "*/*":
              examples:
                이름 누락:
                  description: 이름 누락
                  value:
                    code: COMMON_400
                    status: BAD_REQUEST
                    message: 가게 이름은 필수입니다.
                카테고리 ID 누락:
                  description: 카테고리 ID 누락
                  value:
                    code: COMMON_400
                    status: BAD_REQUEST
                    message: 카테고리 ID는 필수입니다.
                지역 ID 누락:
                  description: 지역 ID 누락
                  value:
                    code: COMMON_400
                    status: BAD_REQUEST
                    message: 지역 ID는 필수입니다.
                주소 누락:
                  description: 주소 누락
                  value:
                    code: COMMON_400
                    status: BAD_REQUEST
                    message: 가게 주소는 필수입니다.
        '403':
          description: 권한 부족 (OWNER 아님)
          content:
            "*/*":
              example:
                code: COMMON_403
                status: FORBIDDEN
                message: 접근 권한이 없습니다.
        '404':
          description: 참조 데이터 없음
          content:
            "*/*":
              examples:
                사용자 없음:
                  description: 사용자 없음
                  value:
                    code: USER_404
                    status: NOT_FOUND
                    message: 사용자를 찾을 수 없습니다.
                카테고리/지역 없음:
                  description: 카테고리/지역 없음
                  value:
                    code: STORE_404
                    status: NOT_FOUND
                    message: 해당 가게가 존재하지 않습니다.
  "/api/v1/stores/{storeId}/menus":
    get:
      tags:
