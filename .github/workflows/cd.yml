name: Deploy to Google Cloud Run

# main 브랜치에 push/merge 완료되는 순간 자동 배포
on:
  push:
    branches:
      - main  # 배포를 원하는 브랜치로 설정
      - feature/poldTest # 배포 테스트만 하는 브랜치
  workflow_dispatch: # 일단 테스트용 수동 버튼 생성 추후 삭제

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPOSITORY: ${{ secrets.GCP_REPOSITORY }}
  SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
  IMAGE_NAME: ${{ secrets.GCP_IMAGE_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Java 설정 (이미지 빌드 전 빌드 아티팩트 생성을 위해 필요할 수 있음)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 2. 프로젝트 빌드 (테스트 제외하고 jar 파일 생성)
      # gradlew 파일에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 3. Google Cloud 인증
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 4. Docker 인증 설정
      - name: Docker Auth
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION}}-docker.pkg.dev

      # 5. Docker 이미지 빌드 및 푸시
      - name: Build and Push Image
        run: |
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/${{ secrets.GCP_IMAGE_NAME }}:latest .
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/${{ secrets.GCP_IMAGE_NAME }}:latest

      # 6. Cloud Run 배포 (모든 Secrets 주입)
      # Cloud Run은 내부적으로 쿠버네티스(Kubernetes) 표준을 따르기 때문에
      # 헬스 체크를 'Probe(조사/탐침)'라고 부릅니다.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.GCP_SERVICE_NAME }} \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/${{ secrets.GCP_IMAGE_NAME }}:latest \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --cpu-boost \
            --liveness-probe="httpGet.path=/actuator/health,httpGet.port=8080,timeoutSeconds=10" \
            --allow-unauthenticated \
            --set-env-vars "DB_URL=${{ secrets.DB_URL }},DB_USERNAME=${{ secrets.DB_USERNAME }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},REDIS_HOST=${{ secrets.REDIS_HOST }},REDIS_PORT=${{ secrets.REDIS_PORT }},TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }},SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }},SLACK_CHANNEL_ID=${{ secrets.SLACK_CHANNEL_ID }},JWT_ACCESS_TOKEN_EXPIRATION=${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION }},JWT_REFRESH_TOKEN_EXPIRATION=${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION }},JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}"

      # 7. 배포 성공 알림 (Slack)
      - name: Slack Notification on Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }} # Webhook URL을 사용하거나 아래처럼 Token 방식 사용 가능
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_COLOR: '#36a64f'
          SLACK_MESSAGE: "🚀 배포 성공! 서비스가 정상적으로 업데이트되었습니다."
          SLACK_TITLE: "Cloud Run 배포 완료"

      # 8. 배포 실패 시 알림 (Slack)
      - name: Slack Notification on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_COLOR: '#ff0000'
          SLACK_MESSAGE: "⚠️ 배포 실패! 이전 리비전이 유지됩니다. 로그를 확인하세요."
          SLACK_TITLE: "Cloud Run 배포 실패"
